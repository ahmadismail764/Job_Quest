<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add License</title>
    <link rel="stylesheet" href="{% static 'css/form.css' %}">
</head>
<body>
    <div class="container">
        <h1>Add License</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_title">Title:</label>
                {{ form.title }}
            </div>
            <div class="form-group">
                <label for="id_where">Where:</label>
                {{ form.where }}
            </div>
            <div class="form-group">
                <label for="id_when">When:</label>
                {{ form.when }}
            </div>
            <button type="submit" class="btn">Add License</button>
        </form>
    </div>
</body>
</html>
